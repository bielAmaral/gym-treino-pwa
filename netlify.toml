# Site estático: raiz do repositório = pasta publicada
[build]
  publish = "."

# Service worker: evita cache agressivo para atualizar o app após deploy
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
